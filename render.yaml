databases:
  - name: photo-opp-db
    databaseName: photo_opp
    user: photo_opp

services:
  - type: web
    name: photo-opp-api
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm ci && npx prisma generate
    startCommand: npm run prisma:migrate:deploy && npm run db:seed && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: photo-opp-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ACTIVE_EVENT_KEY
        value: nexlab-default
      - key: APP_BASE_URL
        sync: false
      - key: APP_TIMEZONE
        value: America/Sao_Paulo
      - key: CORS_ORIGIN
        sync: false
      - key: STORAGE_PUBLIC_BASE_PATH
        value: /storage
      - key: MAX_UPLOAD_SIZE_MB
        value: 10

  - type: static
    name: photo-opp-web
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
